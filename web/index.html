<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO Classic Database TH</title>
<style>
:root {
  --bg: #171c1e;
  --bg2: #1e2628;
  --bg3: #243034;
  --accent: #2ecc71;
  --accent2: #1a8a4a;
  --text: #f0f0f0;
  --text2: #98a8a0;
  --gold: #f1c40f;
  --green: #2ecc71;
  --blue: #5dade2;
  --border: #2c3a38;
  --card-bg: #1c2426;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header {
  background: linear-gradient(135deg, var(--bg2), var(--accent2));
  padding: 20px 30px;
  border-bottom: 3px solid var(--accent);
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.header h1 {
  font-size: 28px;
  background: linear-gradient(90deg, var(--gold), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .stats {
  font-size: 13px;
  color: var(--text2);
}
.header-logo {
  height: 80px;
  margin-bottom: -30px;
  object-fit: contain;
  position: relative;
  z-index: 10;
  pointer-events: none;
}

/* Tabs */
.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
}
.tab {
  padding: 12px 28px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text2);
  font-size: 15px;
  font-weight: 600;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  background: rgba(255,255,255,0.05);
}

/* Content */
.content { padding: 20px 30px; max-width: 1400px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; }

/* Search/Filter bar */
.search-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.search-bar input[type="text"] {
  flex: 1;
  min-width: 200px;
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar select {
  padding: 10px 12px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  outline: none;
}
.search-bar select:focus { border-color: var(--accent); }
.result-count { font-size: 13px; color: var(--text2); margin-left: 8px; }

/* Table */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
thead th {
  background: var(--bg3);
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--gold);
  border-bottom: 2px solid var(--accent);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 10;
}
thead th:hover { background: #1e3a38; }
thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
tbody tr:hover { background: rgba(46,204,113,0.08); }
tbody td { padding: 8px 12px; vertical-align: top; }
td.id-col { color: var(--text2); font-family: monospace; }
td.name-col { color: var(--blue); font-weight: 500; cursor: pointer; }
td.name-col:hover { color: var(--gold); }
td.num-col { text-align: right; font-family: monospace; }
td.cat-col { }

/* Category badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.badge-weapon { background: #8b0000; color: #ffaaaa; }
.badge-armor { background: #00008b; color: #aaaaff; }
.badge-card { background: #006400; color: #aaffaa; }
.badge-usable { background: #8b8000; color: #ffffaa; }
.badge-headgear { background: #4b0082; color: #dda0dd; }
.badge-accessory { background: #2f4f4f; color: #afeeee; }
.badge-collectible { background: #5c4033; color: #deb887; }
.badge-etc { background: #333; color: #999; }
.badge-material { background: #4a4a00; color: #eeee88; }
.badge-equipment { background: #004040; color: #80e0e0; }
.badge-ammunition { background: #4a2a00; color: #dda050; }

/* Map type badges */
.badge-dungeon { background: #8b0000; color: #ffaaaa; }
.badge-field { background: #006400; color: #aaffaa; }
.badge-town { background: #00008b; color: #aaaaff; }
.badge-guild { background: #8b8000; color: #ffffaa; }
.badge-indoor { background: #4a4a4a; color: #ccc; }
.badge-instance { background: #4b0082; color: #dda0dd; }

/* Detail panel */
.detail-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.detail-overlay.show { display: flex; }
.detail-panel {
  background: var(--card-bg);
  border: 2px solid var(--accent);
  border-radius: 12px;
  padding: 24px;
  max-width: 600px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
}
.detail-panel .close-btn {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: var(--accent);
  font-size: 24px;
  cursor: pointer;
}
.detail-panel h2 {
  font-size: 22px;
  color: var(--gold);
  margin-bottom: 16px;
  padding-right: 30px;
}
.detail-row {
  display: flex;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.detail-label {
  width: 120px;
  flex-shrink: 0;
  color: var(--text2);
  font-size: 13px;
}
.detail-value {
  flex: 1;
  font-size: 14px;
  word-break: break-word;
}
.detail-desc {
  margin-top: 16px;
  padding: 12px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
}

/* Pagination */
.pagination {
  display: flex;
  gap: 6px;
  margin-top: 16px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}
.pagination button {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg2);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
}
.pagination button:hover { background: var(--bg3); }
.pagination button.active { background: var(--accent); border-color: var(--accent); }
.pagination button:disabled { opacity: 0.3; cursor: default; }
.pagination .page-info { font-size: 13px; color: var(--text2); }

/* Home section */
/* Monster drops in detail */
.drop-table { width:100%; border-collapse:collapse; margin-top:12px; }
.drop-table th { background:var(--bg3); padding:6px 10px; text-align:left; font-size:12px; color:var(--gold); }
.drop-table td { padding:5px 10px; border-bottom:1px solid var(--border); font-size:13px; }
.drop-table .rate-bar { display:inline-block; height:8px; border-radius:4px; background:var(--accent); min-width:2px; vertical-align:middle; margin-right:6px; }
.mob-stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; }
.mob-stat { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid var(--border); font-size:13px; }
.mob-stat .label { color:var(--text2); }
.mob-stat .val { color:var(--green); font-weight:600; font-family:monospace; }
.badge-boss { background:#8b0000; color:#ff6; font-weight:700; }
.badge-normal { background:#333; color:#aaa; }

/* World Map */
.worldmap-wrapper {
  padding: 0 24px;
}
.worldmap-container {
  position: relative;
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid var(--border);
  background: #12181a;
}
.worldmap-inner {
  position: relative;
  width: 100%;
  padding-bottom: 80%; /* 1024/1280 = 0.8 aspect ratio */
  background: url('roc_map.jpg') no-repeat center/100% 100%;
}
.wm-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 4;
}
.wm-svg line { stroke-width: 2; opacity: 0.7; }
.wm-svg line.wm-link-field { stroke: #4a7; }
.wm-svg line.wm-link-dungeon { stroke: #c44; }
.wm-svg line.wm-link-city { stroke: #5ae; }
.wm-cell.conn-highlight { outline: 2px solid var(--blue) !important; z-index: 5; }
.wm-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
  flex-wrap: wrap;
  padding: 0 24px;
}
.wm-label {
  font-size: 13px;
  color: var(--text2);
  margin-left: auto;
}

/* Map spawn tooltip / click panel */
.map-tooltip {
  position: fixed;
  z-index: 9999;
  background: var(--bg2);
  border: 2px solid var(--accent);
  border-radius: 8px;
  padding: 12px 14px;
  min-width: 280px;
  max-width: 400px;
  max-height: 70vh;
  overflow-y: auto;
  pointer-events: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  display: none;
  font-size: 13px;
}
.map-tooltip.show { display: block; }
.map-tooltip .tt-close {
  position: absolute; top: 6px; right: 10px;
  background: none; border: none; color: var(--text2); font-size: 18px;
  cursor: pointer; line-height: 1;
}
.map-tooltip .tt-close:hover { color: var(--accent); }
.map-tooltip .tt-header {
  font-weight: 700;
  color: var(--gold);
  font-size: 14px;
  margin-bottom: 2px;
  padding-right: 20px;
}
.map-tooltip .tt-area {
  color: var(--text2);
  font-size: 12px;
  margin-bottom: 8px;
}
.map-tooltip .tt-label {
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
  font-size: 12px;
}
.map-tooltip .tt-mob {
  display: flex;
  align-items: center;
  padding: 3px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  gap: 6px;
  cursor: pointer;
  transition: background 0.1s;
}
.map-tooltip .tt-mob:hover { background: rgba(255,255,255,0.06); border-radius: 4px; }
.map-tooltip .tt-mob:last-child { border-bottom: none; }
.map-tooltip .tt-mob-sprite {
  width: 28px; height: 28px;
  object-fit: contain;
  flex-shrink: 0;
  image-rendering: auto;
}
.map-tooltip .tt-mob-name {
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.map-tooltip .tt-mob-name:hover { color: var(--blue); text-decoration: underline; }
.map-tooltip .tt-mob-name.boss { color: #ff6; font-weight: 700; }
.map-tooltip .tt-mob-name.boss:hover { color: #ffa; }
.map-tooltip .tt-mob-info {
  color: var(--text2);
  white-space: nowrap;
  font-family: monospace;
  font-size: 12px;
  flex-shrink: 0;
}
.map-tooltip .tt-mob-lv { color: var(--green); }
.map-tooltip .tt-no-data { color: var(--text2); font-style: italic; }
.map-tooltip .tt-back {
  font-size: 12px; color: var(--blue); cursor: pointer;
  margin-bottom: 4px; padding: 2px 0;
}
.map-tooltip .tt-back:hover { text-decoration: underline; }
.map-tooltip .tt-dungeon {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 6px; margin: 2px 0;
  background: rgba(200,60,60,0.15); border-radius: 4px;
  cursor: pointer; transition: background 0.1s;
  font-size: 12px; color: var(--text);
}
.map-tooltip .tt-dungeon:hover { background: rgba(200,60,60,0.3); }
.map-tooltip .tt-dungeon-icon { color: #c44; font-weight: 700; }
.map-tooltip .tt-connections {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin: 4px 0;
}
.map-tooltip .tt-conn-chip {
  padding: 2px 6px; border-radius: 4px;
  font-size: 11px; cursor: pointer;
  background: rgba(255,255,255,0.08); color: var(--text2);
  transition: all 0.1s;
}
.map-tooltip .tt-conn-chip:hover { background: rgba(46,204,113,0.3); color: var(--text); }
.map-tooltip .tt-conn-dir {
  font-size: 10px; color: var(--accent); font-weight: 700; margin-right: 2px;
}
.map-tooltip .tt-minimap {
  width: 100%; max-height: 80px;
  object-fit: contain; border-radius: 4px;
  margin-bottom: 6px; background: #111;
}

/* World Map search */
.wm-search-box {
  position: relative;
  flex: 1;
  max-width: 300px;
}
.wm-search-box input {
  width: 100%;
  padding: 8px 12px 8px 32px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg2);
  color: var(--text);
  font-size: 13px;
}
.wm-search-box input:focus { outline: none; border-color: var(--accent); }
.wm-search-box::before {
  content: '\1F50D';
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; opacity: 0.5;
}
.wm-cell.search-match {
  background: rgba(46,204,113,0.5) !important;
  border-color: var(--accent) !important;
  z-index: 8 !important;
  animation: wmPulse 1s ease-in-out infinite;
}
@keyframes wmPulse {
  0%,100% { box-shadow: 0 0 4px var(--accent); }
  50% { box-shadow: 0 0 12px var(--accent); }
}
.wm-cell.search-dim {
  opacity: 0.3;
}

/* Map table row hover highlight */
#mapBody tr { cursor: pointer; }
#mapBody tr:hover { background: rgba(46,204,113,0.15); }

/* World map cells with minimap images */
.wm-cell {
  position: absolute;
  border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer;
  transition: all 0.12s;
  z-index: 5;
  overflow: hidden;
  border-radius: 2px;
}
.wm-cell img {
  width: 100%; height: 100%;
  object-fit: fill;
  display: block;
  pointer-events: none;
}
.wm-cell:hover {
  border-color: var(--accent);
  z-index: 10;
  box-shadow: 0 0 6px rgba(46,204,113,0.6);
}
.wm-cell.city {
  border-color: rgba(245,197,24,0.6);
}
.wm-cell.city:hover {
  border-color: var(--gold);
  box-shadow: 0 0 6px rgba(245,197,24,0.6);
}
.wm-cell.has-dungeon::after {
  content: '';
  position: absolute; bottom: 2px; right: 2px;
  width: 8px; height: 8px;
  background: #c44;
  border-radius: 50%;
  border: 1px solid #000;
  z-index: 6;
}
.wm-cell .wm-cell-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  font-size: 7px;
  color: #fff;
  text-align: center;
  background: rgba(0,0,0,0.6);
  padding: 1px 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.wm-cell:hover .wm-cell-label {
  opacity: 1;
}

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 16px; }
  .header h1 { font-size: 22px; }
  .content { padding: 16px; }
  .tab { padding: 10px 16px; font-size: 13px; }
  table { font-size: 12px; }
  thead th, tbody td { padding: 6px 8px; }
  .detail-panel { padding: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <img src="guide_map_2025.png" alt="ROC" class="header-logo">
  <h1>RO Classic Database TH</h1>
  <div class="stats" id="headerStats"></div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="items">Item Database</button>
  <button class="tab" data-tab="cards">Card Database</button>
  <button class="tab" data-tab="monsters">Monster Database</button>
  <button class="tab" data-tab="worldmap">World Map</button>
</div>

<div class="content">
  <!-- ITEMS -->
  <div class="section active" id="sec-items">
    <div class="search-bar">
      <input type="text" id="itemSearch" placeholder="Search items by name or ID...">
      <select id="itemCatFilter">
        <option value="">All Categories</option>
        <option value="Weapon">Weapon</option>
        <option value="Armor">Armor</option>
        <option value="Headgear">Headgear</option>
        <option value="Accessory">Accessory</option>
        <option value="Usable">Usable</option>
        <option value="Collectible">Collectible</option>
        <option value="Material">Material</option>
        <option value="Ammunition">Ammunition</option>
        <option value="Equipment">Equipment</option>
        <option value="Etc">Etc</option>
      </select>
      <select id="itemTypeFilter">
        <option value="">All Types</option>
      </select>
      <span class="result-count" id="itemCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="id" data-type="num">ID <span class="sort-arrow"></span></th>
            <th data-sort="name" data-type="str">Name <span class="sort-arrow"></span></th>
            <th data-sort="cat" data-type="str">Category <span class="sort-arrow"></span></th>
            <th data-sort="wtype" data-type="str">Type <span class="sort-arrow"></span></th>
            <th data-sort="atk" data-type="num">ATK <span class="sort-arrow"></span></th>
            <th data-sort="def" data-type="num">DEF <span class="sort-arrow"></span></th>
            <th data-sort="w" data-type="num">Weight <span class="sort-arrow"></span></th>
            <th data-sort="slots" data-type="num">Slots <span class="sort-arrow"></span></th>
            <th data-sort="rlv" data-type="num">Req Lv <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="itemBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="itemPagination"></div>
  </div>

  <!-- CARDS -->
  <div class="section" id="sec-cards">
    <div class="search-bar">
      <input type="text" id="cardSearch" placeholder="Search cards by name or effect...">
      <select id="cardSlotFilter">
        <option value="">All Slots</option>
        <option value="Weapon">Weapon</option>
        <option value="Armor">Armor</option>
        <option value="Headgear">Headgear</option>
        <option value="Shield">Shield</option>
        <option value="Garment">Garment</option>
        <option value="Foot Gear">Foot Gear</option>
        <option value="Accessory">Accessory</option>
      </select>
      <span class="result-count" id="cardCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="id" data-type="num">ID <span class="sort-arrow"></span></th>
            <th data-sort="name" data-type="str">Name <span class="sort-arrow"></span></th>
            <th data-sort="slot" data-type="str">Slot <span class="sort-arrow"></span></th>
            <th data-sort="desc" data-type="str" style="width:55%">Effect <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="cardBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="cardPagination"></div>
  </div>

  <!-- MONSTERS -->
  <div class="section" id="sec-monsters">
    <div class="search-bar">
      <input type="text" id="mobSearch" placeholder="Search monsters by name, or drop item name...">
      <select id="mobRaceFilter">
        <option value="">All Races</option>
        <option value="Angel">Angel</option>
        <option value="Brute">Brute</option>
        <option value="Demon">Demon</option>
        <option value="Dragon">Dragon</option>
        <option value="Fish">Fish</option>
        <option value="Formless">Formless</option>
        <option value="Human">Human</option>
        <option value="Insect">Insect</option>
        <option value="Plant">Plant</option>
        <option value="Undead">Undead</option>
      </select>
      <select id="mobEleFilter">
        <option value="">All Elements</option>
        <option value="Neutral">Neutral</option>
        <option value="Water">Water</option>
        <option value="Earth">Earth</option>
        <option value="Fire">Fire</option>
        <option value="Wind">Wind</option>
        <option value="Poison">Poison</option>
        <option value="Holy">Holy</option>
        <option value="Dark">Dark</option>
        <option value="Ghost">Ghost</option>
        <option value="Undead">Undead</option>
      </select>
      <select id="mobClassFilter">
        <option value="">All Classes</option>
        <option value="Normal">Normal</option>
        <option value="Boss">Boss/MVP</option>
      </select>
      <span class="result-count" id="mobCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="id" data-type="num" data-section="mob">ID <span class="sort-arrow"></span></th>
            <th data-sort="name" data-type="str" data-section="mob">Name <span class="sort-arrow"></span></th>
            <th data-sort="level" data-type="num" data-section="mob">Lv <span class="sort-arrow"></span></th>
            <th data-sort="hp" data-type="num" data-section="mob">HP <span class="sort-arrow"></span></th>
            <th data-sort="baseExp" data-type="num" data-section="mob">Base EXP <span class="sort-arrow"></span></th>
            <th data-sort="jobExp" data-type="num" data-section="mob">Job EXP <span class="sort-arrow"></span></th>
            <th data-sort="race" data-type="str" data-section="mob">Race <span class="sort-arrow"></span></th>
            <th data-sort="element" data-type="str" data-section="mob">Element <span class="sort-arrow"></span></th>
            <th data-sort="class" data-type="str" data-section="mob">Class <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="mobBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="mobPagination"></div>
  </div>

  <!-- MAPS -->
  <!-- WORLD MAP -->
  <div class="section" id="sec-worldmap">
    <div class="wm-controls">
      <div class="wm-search-box">
        <input type="text" id="wmSearch" placeholder="Search monster or map name..." oninput="wmSearchFilter()">
      </div>
      <span class="wm-label">Double-click map for details</span>
    </div>
    <div class="worldmap-wrapper">
      <div class="worldmap-container" id="wmContainer">
        <div class="worldmap-inner" id="wmInner">
          <svg class="wm-svg" id="wmSvg" viewBox="0 0 1280 1024" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <button class="close-btn" onclick="closeDetail()">&times;</button>
    <div id="detailContent"></div>
  </div>
</div>

<div class="map-tooltip" id="mapTooltip"></div>

<script src="data.js"></script>
<script src="monster_data.js"></script>
<script src="spawn_data.js"></script>
<script src="map_grid.js"></script>
<script src="map_connections.js"></script>
<script>
// ===================== GLOBALS =====================
const PER_PAGE = 50;
let currentTab = 'home';

// Item state
let itemFiltered = [];
let itemPage = 0;
let itemSort = { key: 'id', dir: 1 };

// Card state
let cardData = [];
let cardFiltered = [];
let cardPage = 0;
let cardSort = { key: 'id', dir: 1 };

// Monster state
let mobFiltered = [];
let mobPage = 0;
let mobSort = { key: 'level', dir: 1 };

// Map state
let mapFiltered = [];
let mapPage = 0;
let mapSort = { key: 'name', dir: 1 };

// ===================== INIT =====================
function init() {
  // Prepare card data from items
  cardData = ITEMS.filter(i => i.cat === 'Card').map(c => {
    let slot = '';
    const desc = c.desc || '';
    const m = desc.match(/ใช้กับ\s*:\s*([^\|]+)/);
    if (m) slot = m[1].trim();
    return { id: c.id, name: c.name, slot, desc: cleanCardDesc(desc) };
  });

  // Build weapon type filter options
  const wtypes = new Set();
  ITEMS.forEach(i => { if (i.wtype && i.wtype !== 'Card') wtypes.add(i.wtype); });
  const sel = document.getElementById('itemTypeFilter');
  [...wtypes].sort().forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });

  // Header stats
  document.getElementById('headerStats').textContent =
    `${ITEMS.length.toLocaleString()} Items | ${cardData.length} Cards | ${typeof MONSTERS!=='undefined'?MONSTERS.length:0} Monsters | ${MAPS.length.toLocaleString()} Maps`;

  // Tab events
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });

  // Search/filter events
  document.getElementById('itemSearch').addEventListener('input', debounce(() => { itemPage=0; filterItems(); }, 200));
  document.getElementById('itemCatFilter').addEventListener('change', () => { itemPage=0; filterItems(); });
  document.getElementById('itemTypeFilter').addEventListener('change', () => { itemPage=0; filterItems(); });

  document.getElementById('cardSearch').addEventListener('input', debounce(() => { cardPage=0; filterCards(); }, 200));
  document.getElementById('cardSlotFilter').addEventListener('change', () => { cardPage=0; filterCards(); });

  document.getElementById('mobSearch').addEventListener('input', debounce(() => { mobPage=0; filterMobs(); }, 200));
  document.getElementById('mobRaceFilter').addEventListener('change', () => { mobPage=0; filterMobs(); });
  document.getElementById('mobEleFilter').addEventListener('change', () => { mobPage=0; filterMobs(); });
  document.getElementById('mobClassFilter').addEventListener('change', () => { mobPage=0; filterMobs(); });


  // Sort events
  document.querySelectorAll('#sec-items thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => sortItems(th.dataset.sort, th.dataset.type));
  });
  document.querySelectorAll('#sec-cards thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => sortCards(th.dataset.sort, th.dataset.type));
  });
  document.querySelectorAll('#sec-monsters thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => sortMobs(th.dataset.sort, th.dataset.type));
  });
  // Close detail on overlay click
  document.getElementById('detailOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeDetail();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

  // Initial filter
  filterItems();
  filterCards();
  filterMobs();
}

// ===================== TABS =====================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-'+tab));
}

// ===================== ITEMS =====================
function filterItems() {
  const q = document.getElementById('itemSearch').value.toLowerCase().trim();
  const cat = document.getElementById('itemCatFilter').value;
  const wtype = document.getElementById('itemTypeFilter').value;

  itemFiltered = ITEMS.filter(i => {
    if (i.cat === 'Card') return false; // Cards are separate tab
    if (cat && i.cat !== cat) return false;
    if (wtype && i.wtype !== wtype) return false;
    if (q) {
      const idStr = String(i.id);
      if (!i.name.toLowerCase().includes(q) && !idStr.includes(q) && !(i.desc||'').toLowerCase().includes(q))
        return false;
    }
    return true;
  });

  applySortItems();
  renderItems();
}

function applySortItems() {
  const { key, dir } = itemSort;
  itemFiltered.sort((a, b) => {
    let va = a[key], vb = b[key];
    if (typeof va === 'string') return (va||'').localeCompare(vb||'') * dir;
    return ((va||0) - (vb||0)) * dir;
  });
}

function sortItems(key, type) {
  if (itemSort.key === key) itemSort.dir *= -1;
  else { itemSort.key = key; itemSort.dir = 1; }
  applySortItems();
  itemPage = 0;
  renderItems();
  updateSortArrows('#sec-items', itemSort);
}

function renderItems() {
  const tbody = document.getElementById('itemBody');
  const start = itemPage * PER_PAGE;
  const page = itemFiltered.slice(start, start + PER_PAGE);

  tbody.innerHTML = page.map(i => `
    <tr onclick="showItemDetail(${i.id})">
      <td class="id-col">${i.id}</td>
      <td class="name-col"><img src="https://static.divine-pride.net/images/items/collection/${i.id}.png" style="height:24px;vertical-align:middle;margin-right:6px" onerror="this.style.display='none'">${esc(i.name)}${i.slots ? ` [${i.slots}]` : ''}</td>
      <td class="cat-col"><span class="badge badge-${i.cat.toLowerCase()}">${i.cat}</span></td>
      <td>${esc(i.wtype)}</td>
      <td class="num-col">${i.atk || '-'}</td>
      <td class="num-col">${i.def || '-'}</td>
      <td class="num-col">${i.w || '-'}</td>
      <td class="num-col">${i.slots || '-'}</td>
      <td class="num-col">${i.rlv || '-'}</td>
    </tr>
  `).join('');

  document.getElementById('itemCount').textContent = `${itemFiltered.length.toLocaleString()} results`;
  renderPagination('itemPagination', itemFiltered.length, itemPage, p => { itemPage=p; renderItems(); });
}

function showItemDetail(id) {
  const item = ITEMS.find(i => i.id === id);
  if (!item) return;

  const rows = [
    ['ID', item.id],
    ['Name', item.name],
    ['Category', item.cat],
    ['Type', item.wtype || '-'],
    ['Slots', item.slots || 0],
    ['Weight', item.w || 0],
  ];
  if (item.atk) rows.push(['ATK', item.atk]);
  if (item.matk) rows.push(['MATK', item.matk]);
  if (item.def) rows.push(['DEF', item.def]);
  if (item.wlv) rows.push(['Weapon Lv', item.wlv]);
  if (item.rlv) rows.push(['Required Lv', item.rlv]);
  if (item.eloc) rows.push(['Equip Location', item.eloc]);

  const desc = (item.desc || '').replace(/\|/g, '\n');

  // Find which monsters drop this item
  let droppedByHtml = '';
  if (typeof MONSTERS !== 'undefined') {
    const droppers = MONSTERS.filter(m =>
      (m.drops && m.drops.some(d => d.itemId === id)) ||
      (m.mvpDrops && m.mvpDrops.some(d => d.itemId === id))
    );
    if (droppers.length) {
      droppedByHtml = `<h3 style="color:var(--gold);margin-top:16px;font-size:15px;">Dropped by</h3>`;
      droppers.forEach(m => {
        const drop = (m.drops||[]).find(d => d.itemId === id) || (m.mvpDrops||[]).find(d => d.itemId === id);
        const rate = drop ? (drop.rate / 100).toFixed(2) + '%' : '';
        droppedByHtml += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.06)" onclick="goToMonster(${m.id})">
          <img src="https://static.divine-pride.net/images/mobs/png/${m.id}.png" onerror="this.style.display='none'" style="width:32px;height:32px;object-fit:contain;image-rendering:auto">
          <span style="color:var(--blue);flex:1">${esc(m.name)}</span>
          <span style="color:var(--text2);font-size:12px">Lv${m.level} ${rate}</span>
        </div>`;
      });
    }
  }

  document.getElementById('detailContent').innerHTML = `
    <div style="text-align:center;margin-bottom:12px">
      <img src="https://static.divine-pride.net/images/items/collection/${id}.png" onerror="this.style.display='none'" style="max-height:120px;image-rendering:auto">
    </div>
    <h2>${esc(item.name)}${item.slots ? ` [${item.slots}]` : ''}</h2>
    ${rows.map(([l,v]) => `
      <div class="detail-row">
        <div class="detail-label">${l}</div>
        <div class="detail-value">${esc(String(v))}</div>
      </div>
    `).join('')}
    ${desc ? `<div class="detail-desc">${esc(desc)}</div>` : ''}
    ${droppedByHtml}
  `;
  document.getElementById('detailOverlay').classList.add('show');
}

// ===================== CARDS =====================
function cleanCardDesc(desc) {
  // Remove type/slot/weight info, keep just the effect
  let d = desc.replace(/\s*\|\s*ประเภท\s*:.*$/s, '');
  d = d.replace(/\s*ประเภท\s*:.*$/s, '');
  return d.trim();
}

function filterCards() {
  const q = document.getElementById('cardSearch').value.toLowerCase().trim();
  const slot = document.getElementById('cardSlotFilter').value;

  cardFiltered = cardData.filter(c => {
    if (slot && !c.slot.includes(slot)) return false;
    if (q) {
      if (!c.name.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q) && !String(c.id).includes(q))
        return false;
    }
    return true;
  });

  applySortCards();
  renderCards();
}

function applySortCards() {
  const { key, dir } = cardSort;
  cardFiltered.sort((a, b) => {
    let va = a[key], vb = b[key];
    if (typeof va === 'string') return (va||'').localeCompare(vb||'') * dir;
    return ((va||0) - (vb||0)) * dir;
  });
}

function sortCards(key, type) {
  if (cardSort.key === key) cardSort.dir *= -1;
  else { cardSort.key = key; cardSort.dir = 1; }
  applySortCards();
  cardPage = 0;
  renderCards();
  updateSortArrows('#sec-cards', cardSort);
}

function renderCards() {
  const tbody = document.getElementById('cardBody');
  const start = cardPage * PER_PAGE;
  const page = cardFiltered.slice(start, start + PER_PAGE);

  tbody.innerHTML = page.map(c => `
    <tr onclick="showCardDetail(${c.id})">
      <td class="id-col">${c.id}</td>
      <td class="name-col"><img src="https://static.divine-pride.net/images/items/cards/${c.id}.png" style="height:24px;vertical-align:middle;margin-right:6px" onerror="this.style.display='none'">${esc(c.name)}</td>
      <td>${esc(c.slot) || '-'}</td>
      <td>${esc(c.desc)}</td>
    </tr>
  `).join('');

  document.getElementById('cardCount').textContent = `${cardFiltered.length.toLocaleString()} results`;
  renderPagination('cardPagination', cardFiltered.length, cardPage, p => { cardPage=p; renderCards(); });
}

function showCardDetail(id) {
  const card = cardData.find(c => c.id === id);
  if (!card) return;
  const item = ITEMS.find(i => i.id === id);
  const fullDesc = item ? (item.desc || '').replace(/\|/g, '\n') : card.desc;

  // Find which monsters drop this card
  let droppedByHtml = '';
  if (typeof MONSTERS !== 'undefined') {
    const droppers = MONSTERS.filter(m =>
      (m.drops && m.drops.some(d => d.itemId === id)) ||
      (m.mvpDrops && m.mvpDrops.some(d => d.itemId === id))
    );
    if (droppers.length) {
      droppedByHtml = `<h3 style="color:var(--gold);margin-top:16px;font-size:15px;">Dropped by</h3>`;
      droppers.forEach(m => {
        const drop = (m.drops||[]).find(d => d.itemId === id) || (m.mvpDrops||[]).find(d => d.itemId === id);
        const rate = drop ? (drop.rate / 100).toFixed(2) + '%' : '';
        const spriteUrl = `https://static.divine-pride.net/images/mobs/png/${m.id}.png`;
        droppedByHtml += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.06)" onclick="goToMonster(${m.id})">
          <img src="${spriteUrl}" onerror="this.style.display='none'" style="width:32px;height:32px;object-fit:contain;image-rendering:auto">
          <span style="color:var(--blue);flex:1">${esc(m.name)}</span>
          <span style="color:var(--text2);font-size:12px">Lv${m.level} ${rate}</span>
        </div>`;
      });
    }
  }

  document.getElementById('detailContent').innerHTML = `
    <div style="text-align:center;margin-bottom:12px">
      <img src="https://static.divine-pride.net/images/items/cards/${id}.png" onerror="this.style.display='none'" style="max-height:150px;image-rendering:auto">
    </div>
    <h2>${esc(card.name)}</h2>
    <div class="detail-row"><div class="detail-label">ID</div><div class="detail-value">${card.id}</div></div>
    <div class="detail-row"><div class="detail-label">Equip Slot</div><div class="detail-value">${esc(card.slot) || '-'}</div></div>
    <div class="detail-desc">${esc(fullDesc)}</div>
    ${droppedByHtml}
  `;
  document.getElementById('detailOverlay').classList.add('show');
}

// ===================== MONSTERS =====================
function filterMobs() {
  if (typeof MONSTERS === 'undefined') return;
  const q = document.getElementById('mobSearch').value.toLowerCase().trim();
  const race = document.getElementById('mobRaceFilter').value;
  const ele = document.getElementById('mobEleFilter').value;
  const cls = document.getElementById('mobClassFilter').value;

  mobFiltered = MONSTERS.filter(m => {
    if (race && m.race !== race) return false;
    if (ele && !(m.element||'').startsWith(ele)) return false;
    if (cls) {
      if (cls === 'Boss' && m.class !== 'Boss') return false;
      if (cls === 'Normal' && m.class !== 'Normal') return false;
    }
    if (q) {
      const nameMatch = m.name.toLowerCase().includes(q);
      const idMatch = String(m.id).includes(q);
      const dropMatch = (m.drops||[]).some(d => (d.itemName||'').toLowerCase().includes(q));
      if (!nameMatch && !idMatch && !dropMatch) return false;
    }
    return true;
  });

  applySortMobs();
  renderMobs();
}

function applySortMobs() {
  const { key, dir } = mobSort;
  mobFiltered.sort((a, b) => {
    let va = a[key], vb = b[key];
    if (typeof va === 'string') return (va||'').localeCompare(vb||'') * dir;
    return ((va||0) - (vb||0)) * dir;
  });
}

function sortMobs(key) {
  if (mobSort.key === key) mobSort.dir *= -1;
  else { mobSort.key = key; mobSort.dir = 1; }
  applySortMobs();
  mobPage = 0;
  renderMobs();
  updateSortArrows('#sec-monsters', mobSort);
}

function renderMobs() {
  const tbody = document.getElementById('mobBody');
  const start = mobPage * PER_PAGE;
  const page = mobFiltered.slice(start, start + PER_PAGE);

  tbody.innerHTML = page.map(m => {
    const clsBadge = m.class === 'Boss' ? 'badge-boss' : 'badge-normal';
    return `
    <tr onclick="showMobDetail(${m.id})" style="cursor:pointer">
      <td class="id-col">${m.id}</td>
      <td class="name-col"><img src="https://static.divine-pride.net/images/mobs/png/${m.id}.png" style="width:24px;height:24px;object-fit:contain;vertical-align:middle;margin-right:6px" onerror="${m.spriteUrl?`this.src='${m.spriteUrl}';this.onerror=function(){this.style.display='none'}`:`this.style.display='none'`}">${esc(m.name)}</td>
      <td class="num-col">${m.level}</td>
      <td class="num-col">${(m.hp||0).toLocaleString()}</td>
      <td class="num-col">${(m.baseExp||0).toLocaleString()}</td>
      <td class="num-col">${(m.jobExp||0).toLocaleString()}</td>
      <td>${esc(m.race)}</td>
      <td>${esc(m.element)}</td>
      <td><span class="badge ${clsBadge}">${m.class}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('mobCount').textContent = `${mobFiltered.length.toLocaleString()} results`;
  renderPagination('mobPagination', mobFiltered.length, mobPage, p => { mobPage=p; renderMobs(); });
}

function showMobDetail(id) {
  const m = MONSTERS.find(x => x.id === id);
  if (!m) return;

  const atk = Array.isArray(m.atk) ? m.atk.join(' ~ ') : (m.atk||0);
  const stats = [
    ['Level', m.level], ['HP', (m.hp||0).toLocaleString()],
    ['ATK', atk], ['DEF', m.def||0], ['MDEF', m.mdef||0],
    ['Flee', m.flee||0], ['Hit', m.hit||0],
    ['Base EXP', (m.baseExp||0).toLocaleString()], ['Job EXP', (m.jobExp||0).toLocaleString()],
    ['Element', m.element], ['Race', m.race], ['Size', m.size],
  ];
  // Show detailed stats only if available (from rAthena supplement)
  if (m.str || m.agi || m.vit || m.int || m.dex || m.luk) {
    stats.push(['STR', m.str||0], ['AGI', m.agi||0], ['VIT', m.vit||0],
               ['INT', m.int||0], ['DEX', m.dex||0], ['LUK', m.luk||0]);
  }
  if (m.attackRange) stats.push(['ATK Range', m.attackRange]);
  if (m.walkSpeed) stats.push(['Walk Speed', m.walkSpeed]);
  stats.push(['Class', m.class]);

  let dropsHtml = '';
  if (m.drops && m.drops.length) {
    dropsHtml = `<h3 style="color:var(--gold);margin-top:16px;font-size:15px;">Drops</h3>
    <table class="drop-table"><thead><tr><th>Item</th><th>Rate</th></tr></thead><tbody>`;
    m.drops.forEach(d => {
      const pct = d.rate / 100;
      const barW = Math.min(200, Math.max(2, pct * 2));
      const clickable = d.itemId ? `style="cursor:pointer" onclick="goToItem(${d.itemId})"` : '';
      const nameStyle = d.itemId ? 'color:var(--blue)' : 'color:var(--text2)';
      dropsHtml += `<tr ${clickable}>
        <td style="${nameStyle}">${esc(d.itemName)}</td>
        <td><span class="rate-bar" style="width:${barW}px"></span>${pct.toFixed(2)}%</td>
      </tr>`;
    });
    dropsHtml += '</tbody></table>';
  }

  let mvpHtml = '';
  if (m.mvpDrops && m.mvpDrops.length) {
    mvpHtml = `<h3 style="color:var(--gold);margin-top:16px;font-size:15px;">MVP Drops</h3>
    <table class="drop-table"><thead><tr><th>Item</th><th>Rate</th></tr></thead><tbody>`;
    m.mvpDrops.forEach(d => {
      const pct = d.rate / 100;
      const clickable = d.itemId ? `style="cursor:pointer" onclick="goToItem(${d.itemId})"` : '';
      const nameStyle = d.itemId ? 'color:var(--blue)' : 'color:var(--text2)';
      mvpHtml += `<tr ${clickable}><td style="${nameStyle}">${esc(d.itemName)}</td><td>${pct.toFixed(2)}%</td></tr>`;
    });
    mvpHtml += '</tbody></table>';
  }

  // Spawn maps
  let spawnHtml = '';
  if (typeof MAP_SPAWNS !== 'undefined') {
    const spawnMaps = [];
    for (const [mapName, spawns] of Object.entries(MAP_SPAWNS)) {
      const entry = spawns.find(s => s.n === m.name);
      if (entry) spawnMaps.push({ map: mapName, count: entry.c, respawn: entry.r });
    }
    if (spawnMaps.length) {
      spawnHtml = `<h3 style="color:var(--gold);margin-top:16px;font-size:15px;">Spawn Maps</h3><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">`;
      spawnMaps.forEach(s => {
        const mapInfo = MAPS ? MAPS.find(x => x.name === s.map) : null;
        const label = mapInfo && mapInfo.display ? `${s.map} (${mapInfo.display})` : s.map;
        const rStr = s.respawn ? ` / ${s.respawn}` : '';
        spawnHtml += `<span onclick="goToMap('${s.map}')" style="cursor:pointer;background:var(--bg3);padding:4px 10px;border-radius:4px;font-size:12px;color:var(--blue);border:1px solid var(--border);transition:background 0.1s" onmouseover="this.style.background='var(--accent2)'" onmouseout="this.style.background='var(--bg3)'">${esc(label)} x${s.count}${rStr}</span>`;
      });
      spawnHtml += '</div>';
    }
  }

  const spriteUrl = `https://static.divine-pride.net/images/mobs/png/${id}.png`;
  const rocSprite = m.spriteUrl || '';
  const fallback = rocSprite ? `this.src='${rocSprite}';this.onerror=function(){this.style.display='none'}` : `this.style.display='none'`;
  document.getElementById('detailContent').innerHTML = `
    <h2 style="text-align:center">${esc(m.name)} <span class="badge ${m.class==='Boss'?'badge-boss':'badge-normal'}">${m.class}</span></h2>
    <div style="text-align:center;margin:12px 0">
      <img src="${spriteUrl}" onerror="${fallback}" style="max-height:150px;image-rendering:auto">
    </div>
    <div class="mob-stats-grid">
      ${stats.map(([l,v]) => `<div class="mob-stat"><span class="label">${l}</span><span class="val">${v}</span></div>`).join('')}
    </div>
    ${spawnHtml}${dropsHtml}${mvpHtml}
  `;
  document.getElementById('detailOverlay').classList.add('show');
}

function goToItem(itemId) {
  if (!itemId) return;
  closeDetail();
  switchTab('items');
  setTimeout(() => showItemDetail(itemId), 100);
}

function goToMap(mapName) {
  closeDetail();
  switchTab('worldmap');
  setTimeout(() => {
    // Highlight and scroll to the map cell
    const cell = document.querySelector(`.wm-cell[data-map="${mapName}"]`);
    if (cell) {
      cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
      showMapPanel(mapName, cell);
      drawConnectionsForMap(mapName);
    }
  }, 200);
}

// ===================== MAPS =====================
function filterMaps() {
  const q = document.getElementById('mapSearch').value.toLowerCase().trim();
  const type = document.getElementById('mapTypeFilter').value;
  const hasSpawns = typeof MAP_SPAWNS !== 'undefined';

  mapFiltered = MAPS.filter(m => {
    if (type && m.type !== type) return false;
    if (q) {
      // Search map name, display name, region
      if (m.name.toLowerCase().includes(q) || m.display.toLowerCase().includes(q) || (m.sub||'').toLowerCase().includes(q))
        return true;
      // Also search monster names on this map
      if (hasSpawns && MAP_SPAWNS[m.name]) {
        return MAP_SPAWNS[m.name].some(s => s.n.toLowerCase().includes(q));
      }
      return false;
    }
    return true;
  });

  applySortMaps();
  renderMaps();
}

function applySortMaps() {
  const { key, dir } = mapSort;
  mapFiltered.sort((a, b) => {
    let va = a[key], vb = b[key];
    return (va||'').localeCompare(vb||'') * dir;
  });
}

function sortMaps(key, type) {
  if (mapSort.key === key) mapSort.dir *= -1;
  else { mapSort.key = key; mapSort.dir = 1; }
  applySortMaps();
  mapPage = 0;
  renderMaps();
  updateSortArrows('#sec-maps', mapSort);
}

function renderMaps() {
  const tbody = document.getElementById('mapBody');
  const start = mapPage * PER_PAGE;
  const page = mapFiltered.slice(start, start + PER_PAGE);

  const hasSpawns = typeof MAP_SPAWNS !== 'undefined';

  tbody.innerHTML = page.map(m => {
    const badge = m.type.toLowerCase().replace(/[^a-z]/g,'');
    const spawns = hasSpawns ? MAP_SPAWNS[m.name] : null;
    const spawnCount = spawns ? spawns.length : 0;
    const mobBadge = spawnCount > 0 ? `<span style="margin-left:6px;font-size:11px;color:var(--text2)">(${spawnCount} mobs)</span>` : '';
    // Calculate level range
    let lvRange = '-';
    if (spawns && spawns.length > 0) {
      const lvls = spawns.filter(s => s.lv > 0).map(s => s.lv);
      if (lvls.length > 0) {
        const minLv = Math.min(...lvls);
        const maxLv = Math.max(...lvls);
        lvRange = minLv === maxLv ? `${minLv}` : `${minLv}~${maxLv}`;
      }
    }
    return `
    <tr data-map="${esc(m.name)}">
      <td><code style="color:var(--green)">${esc(m.name)}</code>${mobBadge}</td>
      <td>${esc(m.display)}</td>
      <td><span class="badge badge-${badge}">${m.type}</span></td>
      <td style="color:var(--text2)">${esc(m.sub || '-')}</td>
      <td style="color:var(--green);font-family:monospace;text-align:center">${lvRange}</td>
    </tr>
    `;
  }).join('');

  // Attach hover events for tooltips
  if (hasSpawns) {
    tbody.querySelectorAll('tr[data-map]').forEach(tr => {
      tr.addEventListener('mouseenter', showMapTooltip);
      tr.addEventListener('mousemove', moveMapTooltip);
      tr.addEventListener('mouseleave', hideMapTooltip);
    });
  }

  document.getElementById('mapCount').textContent = `${mapFiltered.length.toLocaleString()} results`;
  renderPagination('mapPagination', mapFiltered.length, mapPage, p => { mapPage=p; renderMaps(); });
}

// Map tooltip functions
function showMapTooltip(e) {
  const mapName = e.currentTarget.dataset.map;
  const spawns = MAP_SPAWNS[mapName];
  const tooltip = document.getElementById('mapTooltip');

  // Find map display info
  const mapInfo = MAPS.find(m => m.name === mapName);
  const displayName = mapInfo ? (mapInfo.display || mapInfo.title || '') : '';

  let html = `<div class="tt-header">Map: ${esc(mapName)}</div>`;
  if (displayName) {
    html += `<div class="tt-area">Area: ${esc(displayName)}</div>`;
  }

  if (!spawns || spawns.length === 0) {
    html += `<div class="tt-no-data">No monster data</div>`;
  } else {
    html += `<div class="tt-label">Monsters:</div>`;
    spawns.forEach(m => {
      const nameClass = m.b ? 'tt-mob-name boss' : 'tt-mob-name';
      const respawn = m.r ? ` / ${m.r} min` : '';
      html += `<div class="tt-mob">
        <span class="${nameClass}">${esc(m.n)}</span>
        <span class="tt-mob-info"><span class="tt-mob-lv">Lv${m.lv}</span> (${m.c}${respawn})</span>
      </div>`;
    });
  }

  tooltip.innerHTML = html;
  tooltip.classList.add('show');
  positionTooltip(e, tooltip);
}

function moveMapTooltip(e) {
  positionTooltip(e, document.getElementById('mapTooltip'));
}

function hideMapTooltip() {
  const tt = document.getElementById('mapTooltip');
  tt.classList.remove('show');
  tt.style.maxHeight = '';
  tt.style.overflowY = '';
}

function positionTooltip(e, tooltip) {
  const pad = 16;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const rect = tooltip.getBoundingClientRect();
  // Keep tooltip within viewport
  if (x + rect.width > window.innerWidth - pad) {
    x = e.clientX - rect.width - pad;
  }
  if (y + rect.height > window.innerHeight - pad) {
    y = e.clientY - rect.height - pad;
  }
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// ===================== SHARED =====================
function renderPagination(elId, total, current, onChange) {
  const el = document.getElementById(elId);
  const pages = Math.ceil(total / PER_PAGE);
  if (pages <= 1) { el.innerHTML = ''; return; }

  let html = '';
  html += `<button ${current===0?'disabled':''} onclick="void(0)">&#171; Prev</button>`;

  const range = getPageRange(current, pages);
  range.forEach(p => {
    if (p === '...') html += `<span style="color:var(--text2)">...</span>`;
    else html += `<button class="${p===current?'active':''}">${p+1}</button>`;
  });

  html += `<button ${current===pages-1?'disabled':''}>Next &#187;</button>`;
  html += `<span class="page-info">Page ${current+1} of ${pages}</span>`;

  el.innerHTML = html;

  // Bind events
  const btns = el.querySelectorAll('button');
  btns[0].onclick = () => { if(current>0) onChange(current-1); };
  btns[btns.length-1].onclick = () => { if(current<pages-1) onChange(current+1); };
  const rangeBtns = [...btns].slice(1, -1);
  let ri = 0;
  range.forEach(p => {
    if (p !== '...') {
      rangeBtns[ri].onclick = () => onChange(p);
      ri++;
    }
  });
}

function getPageRange(current, total) {
  if (total <= 7) return Array.from({length:total}, (_,i) => i);
  const r = [];
  r.push(0);
  if (current > 3) r.push('...');
  for (let i = Math.max(1, current-1); i <= Math.min(total-2, current+1); i++) r.push(i);
  if (current < total-4) r.push('...');
  r.push(total-1);
  return r;
}

function updateSortArrows(section, sort) {
  document.querySelectorAll(`${section} thead th`).forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    if (!arrow) return;
    if (th.dataset.sort === sort.key) arrow.textContent = sort.dir === 1 ? '▲' : '▼';
    else arrow.textContent = '';
  });
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ===================== WORLD MAP =====================

function initWorldMap() {
  // No zoom/pan needed - map scales to fit screen width
}

// Build grid cells with minimap images + SVG connection lines
let wmActiveCell = null;
// Cache cell positions for SVG lines (in 1280x1024 coordinate space)
const wmCellCenters = {};

function buildWorldMapGrid() {
  if (typeof MAP_GRID_DATA === 'undefined' || typeof MAP_SPAWNS === 'undefined') return;
  const inner = document.getElementById('wmInner');

  // Build set of maps that have dungeon entrances
  const dungeonEntrances = new Set();
  if (typeof DUNGEON_GROUPS !== 'undefined') {
    Object.values(DUNGEON_GROUPS).forEach(dg => dungeonEntrances.add(dg.entrance));
  }

  // Create map cells using percentage positioning (relative to 1280x1024)
  MAP_GRID_DATA.forEach(cell => {
    const div = document.createElement('div');
    const hasSpawns = MAP_SPAWNS[cell.n];
    const isCity = cell.city;
    const hasDungeon = dungeonEntrances.has(cell.n);

    let cls = 'wm-cell';
    if (hasSpawns) cls += ' has-spawns';
    if (isCity) cls += ' city';
    if (hasDungeon) cls += ' has-dungeon';
    div.className = cls;

    // Position as percentages of 1280x1024
    div.style.left = (cell.x1 / 1280 * 100) + '%';
    div.style.top = (cell.y1 / 1024 * 100) + '%';
    div.style.width = ((cell.x2 - cell.x1) / 1280 * 100) + '%';
    div.style.height = ((cell.y2 - cell.y1) / 1024 * 100) + '%';

    // Minimap image
    if (cell.img) {
      const img = document.createElement('img');
      img.src = `minimaps/${cell.n}.png`;
      img.alt = cell.n;
      img.loading = 'lazy';
      img.onerror = function() { this.style.display = 'none'; };
      div.appendChild(img);
    }

    // Label
    const displayName = (typeof MAP_DISPLAY_NAMES !== 'undefined' && MAP_DISPLAY_NAMES[cell.n])
      ? MAP_DISPLAY_NAMES[cell.n] : cell.n;
    const label = document.createElement('span');
    label.className = 'wm-cell-label';
    label.textContent = isCity ? displayName : cell.n;
    div.appendChild(label);

    div.dataset.map = cell.n;
    div.addEventListener('dblclick', (e) => {
      showWmCellPanel(e);
    });
    inner.appendChild(div);

    // Cache center position for SVG lines
    wmCellCenters[cell.n] = {
      x: (cell.x1 + cell.x2) / 2,
      y: (cell.y1 + cell.y2) / 2,
    };
  });

  // Close panel on click outside
  document.addEventListener('click', (e) => {
    const tooltip = document.getElementById('mapTooltip');
    if (!tooltip.classList.contains('show')) return;
    if (tooltip.contains(e.target)) return;
    if (e.target.closest('.wm-cell')) return;
    // If target was detached from DOM (e.g. innerHTML replaced by showMapPanel), don't close
    if (!document.contains(e.target)) return;
    closeWmPanel();
  });
}

function drawConnectionsForMap(mapName) {
  const svg = document.getElementById('wmSvg');
  if (!svg || typeof MAP_CONNECTIONS === 'undefined') return;

  // Clear previous lines
  svg.innerHTML = '';

  const conns = MAP_CONNECTIONS[mapName];
  if (!conns || !wmCellCenters[mapName]) return;

  const from = wmCellCenters[mapName];

  // Highlight connected cells
  document.querySelectorAll('.wm-cell.conn-highlight').forEach(c => c.classList.remove('conn-highlight'));

  conns.forEach(c => {
    if (!wmCellCenters[c.to]) return;
    const to = wmCellCenters[c.to];

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.x);
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x);
    line.setAttribute('y2', to.y);

    const isCityConn = CITIES_SET && (CITIES_SET.has(mapName) || CITIES_SET.has(c.to));
    const isDunConn = c.dir === 'portal';
    line.classList.add(isDunConn ? 'wm-link-dungeon' : isCityConn ? 'wm-link-city' : 'wm-link-field');

    svg.appendChild(line);

    // Highlight target cell
    const targetCell = document.querySelector(`.wm-cell[data-map="${c.to}"]`);
    if (targetCell) targetCell.classList.add('conn-highlight');
  });
}

// Set of city maps for connection line classification
const CITIES_SET = new Set([
  'yuno','einbroch','lighthalzen','hugel','aldebaran','geffen','prontera',
  'izlude','morocc','alberta','payon','comodo','rachel','veins','einbech',
  'umbala','amatsu','louyang','gonryun','ayothaya','nifflheim','xmas',
]);

function getMobId(name) {
  if (!MONSTERS) return null;
  const m = MONSTERS.find(x => x.name.toLowerCase() === name.toLowerCase());
  return m ? m.id : null;
}

function showWmCellPanel(e) {
  const cell = e.currentTarget;
  const mapName = cell.dataset.map;
  showMapPanel(mapName, cell);
}

function showMapPanel(mapName, anchorEl) {
  const tooltip = document.getElementById('mapTooltip');
  const spawns = MAP_SPAWNS[mapName];
  const displayName = (typeof MAP_DISPLAY_NAMES !== 'undefined' && MAP_DISPLAY_NAMES[mapName]) || '';

  // Update connection lines for current map
  drawConnectionsForMap(mapName);

  // Highlight active cell - only change if clicking a grid cell
  if (anchorEl) {
    if (wmActiveCell) wmActiveCell.style.outline = '';
    wmActiveCell = anchorEl;
    anchorEl.style.outline = '2px solid var(--accent)';
  }

  let html = `<button class="tt-close" onclick="closeWmPanel()">&times;</button>`;

  // Check if this map is a dungeon floor - show back button
  let parentDungeon = null;
  if (typeof DUNGEON_GROUPS !== 'undefined') {
    for (const [name, dg] of Object.entries(DUNGEON_GROUPS)) {
      const floorIdx = dg.floors.indexOf(mapName);
      if (floorIdx >= 0) {
        parentDungeon = { name, entrance: dg.entrance, floors: dg.floors, floorIdx };
        break;
      }
    }
  }

  if (parentDungeon) {
    const entranceName = (typeof MAP_DISPLAY_NAMES !== 'undefined' && MAP_DISPLAY_NAMES[parentDungeon.entrance]) || parentDungeon.entrance;
    html += `<div class="tt-back" onclick="showMapPanel('${parentDungeon.entrance}')">&#x2190; ${esc(entranceName)}</div>`;
    html += `<div class="tt-header">${esc(parentDungeon.name)} ${parentDungeon.floorIdx + 1}F</div>`;
    html += `<div style="color:var(--text2);font-size:11px;margin-bottom:6px">${esc(mapName)}</div>`;
  } else {
    html += `<div class="tt-header">${esc(mapName)}${displayName ? ' - ' + esc(displayName) : ''}</div>`;
  }

  // Minimap thumbnail
  html += `<img class="tt-minimap" src="minimaps/${mapName}.png" onerror="this.style.display='none'" alt="">`;

  // Floor navigation for dungeons
  if (parentDungeon && parentDungeon.floors.length > 1) {
    html += `<div class="tt-label">Floors</div><div class="tt-connections">`;
    parentDungeon.floors.forEach((floor, i) => {
      const isActive = floor === mapName ? ' style="background:var(--accent);color:#000"' : '';
      html += `<span class="tt-conn-chip"${isActive} onclick="showMapPanel('${floor}')">${i+1}F</span>`;
    });
    html += `</div>`;
  }

  // Connected maps
  if (typeof MAP_CONNECTIONS !== 'undefined' && MAP_CONNECTIONS[mapName]) {
    const conns = MAP_CONNECTIONS[mapName];
    html += `<div class="tt-label">Connected Maps</div>`;
    html += `<div class="tt-connections">`;
    conns.forEach(c => {
      const cName = (typeof MAP_DISPLAY_NAMES !== 'undefined' && MAP_DISPLAY_NAMES[c.to]) || c.to;
      html += `<span class="tt-conn-chip" onclick="showMapPanel('${c.to}')"><span class="tt-conn-dir">${c.dir}</span>${esc(cName)}</span>`;
    });
    html += `</div>`;
  }

  // Dungeon entrances from this map
  if (typeof DUNGEON_GROUPS !== 'undefined') {
    const mapDungeons = Object.entries(DUNGEON_GROUPS).filter(([,dg]) => dg.entrance === mapName);
    if (mapDungeons.length > 0) {
      html += `<div class="tt-label">Dungeons</div>`;
      mapDungeons.forEach(([name, dg]) => {
        dg.floors.forEach((floor, i) => {
          const floorSpawns = MAP_SPAWNS[floor];
          const monCount = floorSpawns ? floorSpawns.length : 0;
          const floorLabel = dg.floors.length > 1 ? `${name} ${i+1}F` : name;
          html += `<div class="tt-dungeon" onclick="showMapPanel('${floor}')">
            <span class="tt-dungeon-icon">&#x26A0;</span>
            <span style="flex:1">${esc(floorLabel)}</span>
            <span style="color:var(--text2);font-size:11px">${monCount} mon</span>
          </div>`;
        });
      });
    }
  }

  // Monster spawns
  if (spawns && spawns.length > 0) {
    const levels = spawns.map(m => m.lv).filter(l => l > 0);
    if (levels.length > 0) {
      const minLv = Math.min(...levels);
      const maxLv = Math.max(...levels);
      html += `<div class="tt-area">Lv ${minLv}${maxLv !== minLv ? ' ~ ' + maxLv : ''} | ${spawns.length} monsters</div>`;
    }

    html += `<div class="tt-label">Monsters</div>`;
    spawns.forEach(m => {
      const mobId = getMobId(m.n);
      const nameClass = m.b ? 'tt-mob-name boss' : 'tt-mob-name';
      const respawn = m.r ? ` / ${m.r}` : '';
      const mob = mobId ? MONSTERS.find(x => x.id === mobId) : null;
      const spriteUrl = mobId ? `https://static.divine-pride.net/images/mobs/png/${mobId}.png` : '';
      const rocSprite = mob && mob.spriteUrl ? mob.spriteUrl : '';
      const spriteFallback = rocSprite ? `this.src='${rocSprite}';this.onerror=function(){this.style.display='none'}` : `this.style.display='none'`;
      const spriteImg = spriteUrl ? `<img class="tt-mob-sprite" src="${spriteUrl}" onerror="${spriteFallback}" loading="lazy">` : (rocSprite ? `<img class="tt-mob-sprite" src="${rocSprite}" onerror="this.style.display='none'" loading="lazy">` : '<span style="width:28px;display:inline-block"></span>');
      const clickAttr = mobId ? `onclick="goToMonster(${mobId})"` : '';
      html += `<div class="tt-mob" ${clickAttr}>
        ${spriteImg}
        <span class="${nameClass}">${esc(m.n)}</span>
        <span class="tt-mob-info"><span class="tt-mob-lv">Lv${m.lv}</span> x${m.c}${respawn}</span>
      </div>`;
    });
  } else if (!spawns) {
    html += `<div class="tt-no-data">No spawn data</div>`;
  }

  tooltip.innerHTML = html;
  tooltip.classList.add('show');

  // Position tooltip - only reposition if clicking a grid cell (anchorEl provided)
  // When navigating dungeon floors (no anchorEl), keep tooltip where it is
  if (anchorEl) {
    const rect = anchorEl.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let left = rect.right + 8;
    let top = rect.top;
    if (left + 400 > vw) left = rect.left - 408;
    if (left < 4) left = 4;
    if (top + 400 > vh) top = vh - 420;
    if (top < 4) top = 4;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }
  // Scroll tooltip to top when content changes
  tooltip.scrollTop = 0;
}

function closeWmPanel() {
  const tooltip = document.getElementById('mapTooltip');
  tooltip.classList.remove('show');
  if (wmActiveCell) { wmActiveCell.style.outline = ''; wmActiveCell = null; }
  // Clear connection lines and highlights
  const svg = document.getElementById('wmSvg');
  if (svg) svg.innerHTML = '';
  document.querySelectorAll('.wm-cell.conn-highlight').forEach(c => c.classList.remove('conn-highlight'));
}

function goToMonster(id) {
  closeWmPanel();
  switchTab('monsters');
  setTimeout(() => showMobDetail(id), 100);
}

// World Map search
function wmSearchFilter() {
  const q = document.getElementById('wmSearch').value.toLowerCase().trim();
  const cells = document.querySelectorAll('.wm-cell');
  if (!q) {
    cells.forEach(c => { c.classList.remove('search-match', 'search-dim'); });
    return;
  }
  let hasMatch = false;
  cells.forEach(c => {
    const mapName = c.dataset.map;
    let match = mapName.toLowerCase().includes(q);
    // Search map display name
    if (!match && typeof MAP_DISPLAY_NAMES !== 'undefined' && MAP_DISPLAY_NAMES[mapName]) {
      if (MAP_DISPLAY_NAMES[mapName].toLowerCase().includes(q)) match = true;
    }
    // Search monster names on this map
    if (!match && MAP_SPAWNS[mapName]) {
      match = MAP_SPAWNS[mapName].some(s => s.n.toLowerCase().includes(q));
    }
    // Search dungeon floors connected to this map
    if (!match && typeof DUNGEON_GROUPS !== 'undefined') {
      for (const [name, dg] of Object.entries(DUNGEON_GROUPS)) {
        if (dg.entrance !== mapName) continue;
        if (name.toLowerCase().includes(q)) { match = true; break; }
        for (const floor of dg.floors) {
          if (floor.includes(q)) { match = true; break; }
          if (MAP_SPAWNS[floor] && MAP_SPAWNS[floor].some(s => s.n.toLowerCase().includes(q))) { match = true; break; }
        }
        if (match) break;
      }
    }
    if (match) {
      c.classList.add('search-match');
      c.classList.remove('search-dim');
      hasMatch = true;
    } else {
      c.classList.remove('search-match');
      c.classList.add('search-dim');
    }
  });
  if (!hasMatch) {
    cells.forEach(c => { c.classList.remove('search-match', 'search-dim'); });
  }
}


// Init world map on first tab switch
let wmInited = false;
const origSwitchTab = switchTab;
switchTab = function(tab) {
  origSwitchTab(tab);
  if (tab === 'worldmap' && !wmInited) {
    wmInited = true;
    initWorldMap();
    buildWorldMapGrid();
  }
};

init();
